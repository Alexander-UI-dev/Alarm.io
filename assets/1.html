<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <style>
            * {
                padding: 0;
                margin: 0;
                box-sizing: border-box;
                font-family: 'Montserrat', sans-serif;
            }
            body {
                width: 100vw;
                height: 100vh;
                background: #f2f4f6;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            ul {
                list-style: none;
            }
            .context-menu { 
                position: absolute; 
            } 
            .menu {
                display: flex;
                flex-direction: column;
                background-color: #fff;
                border-radius: 10px;
                box-shadow: 0 10px 20px rgb(64 64 64 / 5%);
                padding: 10px 0;
            }
            .menu > li > a {
                font: inherit;
                border: 0;
                padding: 10px 30px 10px 15px;
                width: 100%;
                display: flex;
                align-items: center;
                position: relative;
                text-decoration: unset;
                color: #000;
                font-weight: 500;
                transition: 0.5s linear;
                -webkit-transition: 0.5s linear;
                -moz-transition: 0.5s linear;
                -ms-transition: 0.5s linear;
                -o-transition: 0.5s linear;
            }
            .menu > li > a:hover {
                background:#f1f3f7;
                color: #4b00ff;
            }
            .menu > li > a > i {
                padding-right: 10px;
            }
            .menu > li.trash > a:hover {
                color: red;
            }
        </style>
        <select name="music-select" id="select-1">
            <option value="1">Hello</option>
            <option value="2">HI!</option>
            <option value="3">NO</option>
            <option value="4">YES</option>
        </select>
        <div id="contextMenu" class="context-menu" style="display: none;"> 
            <ul class="menu"> 
                <li class="share"><a href="#"> Share</a></li> 
                <li class="rename"><a href="#">Rename</a></li> 
                <li class="link"><a href="#">Copy Link Address</a></li> 
                <li class="copy"><a href="#">Copy to</a></li> 
                <li class="paste"><a href="#">Move to</a></li> 
                <li class="download"><a href="#">Download</a></li> 
                <li class="trash"><a href="#">Delete</a></li> 
            </ul> 
        </div> 
        <script>
            const contextMenu = document.getElementById('contextMenu');

            function contextHandler(event) {
                console.log(event);
                
                event.preventDefault()

                if(contextMenu.style.display === 'none') {
                    contextMenu.style.left = event.pageX + 'px';
                    contextMenu.style.top = event.pageY + 'px';
                    contextMenu.style.display = 'block';
                } else {
                    contextMenu.style.left = event.pageX + 'px';
                    contextMenu.style.top = event.pageY + 'px';
                }
            }

            function clickContextMenu(event) {
                console.log(event);
                
                event.preventDefault()
                contextMenu.style.display = 'none';
            }

            function keyDownHandler(event) {
                console.log(event);
                
                event.preventDefault()
                if(event.keyCode === 27)
                    contextMenu.style.display = 'none';
            }


            document.querySelector("#select-1 option[value='1']").addEventListener('contextmenu', contextHandler);
            document.querySelector("#select-1 option[value='1']").addEventListener('click', clickContextMenu);
            document.querySelector("#select-1 option[value='1']").addEventListener('keydown', keyDownHandler);
        </script>
    </body>
</html>
