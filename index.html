<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./css/main.css">
        <link rel="stylesheet" href="./assets/font-awesome-4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="./css/media/@media--header.css">
        <link rel="stylesheet" href="./css/media/@media--time-box.css">
        <link rel="stylesheet" href="./css/media/@media--title-alarm.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css">
        <title>Будильник онлайн 3</title>
    </head>
    <body>
        <div class="start-div"></div>
        <div class="main-title">Онлайн будильник</div>
        <button class="btn-preferens" title="Настройки">
            <i class="fa fa-sliders" aria-hidden="true"></i>
        </button>
        <div class="overlay"></div>
        <main class="main-container">
            <div class="time-box">
                <span class="hours">15</span>
                <span class="r">:</span>
                <span class="minutes">16</span>
            </div>
            <span class="date">Понедельник, 26 мая</span>    
        </main>
        <span class="title-alarm">Установить время будильника:</span>
        <div class="install-alarm">
            <div class="hours_swiper swiper-block">
                <div class="swiper swiperH">
                    <div class="swiper-wrapper"></div>
                </div>
            </div>
            <span class="title-time-hours">Часы</span>
            <div class="minutes_swiper swiper-block">
                <div class="swiper swiperM">
                    <div class="swiper-wrapper"></div>
                </div>
            </div>
            <span class="title-time-minutes">Минуты</span>
            <select name="hours" id="selectHours" class="selectTime"></select>
            <select name="minutes" id="selectMinutes" class="selectTime"></select>
        </div>
        <div class="popular-times">
            
        </div>
        <script src="./js/isMobile.js"></script>
        <script src="./js/time.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>
        <script src="./js/swiperAlarm.js"></script>
    </body>
</html>
